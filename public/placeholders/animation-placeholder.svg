<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Animation placeholder">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <rect width="800" height="450" fill="url(#glow2)"/>
  <!-- Wand -->
  <line x1="340" y1="290" x2="430" y2="200" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <circle cx="430" cy="200" r="6" fill="#c4b5fd"/>
  <!-- Star burst around wand tip -->
  <g fill="#a78bfa" opacity="0.85">
    <polygon points="430,174 434,192 452,192 438,203 443,221 430,210 417,221 422,203 408,192 426,192" transform="scale(0.7) translate(204,90)"/>
  </g>
  <!-- Sparkle dots -->
  <circle cx="360" cy="170" r="4" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="460" cy="240" r="3" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="310" cy="230" r="2.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="490" cy="175" r="2" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="390" cy="290" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="470" cy="305" r="3" fill="#c4b5fd" opacity="0.6"/>
  <!-- Label -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" letter-spacing="5" fill="#a78bfa" opacity="0.8">KOYDO</text>
  <text x="400" y="364" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6d6d8a" letter-spacing="2">Animation Loading…</text>
</svg>