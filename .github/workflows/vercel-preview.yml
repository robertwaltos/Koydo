name: Vercel Preview Deployment

on:
  push:
    branches-ignore:
      - master
  workflow_dispatch:

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      VERCEL_ORG_ID: team_Rjgb3m3TRQJLzzraH63zyCtn
      VERCEL_PROJECT_ID: prj_djBqL0JZbdrle195lhUwCAwzmokn
      # Build-time env stubs so Next.js compiles without real secrets
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
      STRIPE_SECRET_KEY: ${{ vars.STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }}
      STRIPE_WEBHOOK_SECRET: ${{ vars.STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }}
      NODE_OPTIONS: --max-old-space-size=14336

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> $GITHUB_OUTPUT
          echo "Preview URL: $url"

      - name: Comment preview URL on PR
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.substring(0, 7);

            // Find open PRs for this branch
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            const body = [
              `## 🚀 Vercel Preview Deployment`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Status** | ✅ Ready |`,
            ].join('\n');

            for (const pr of pulls.data) {
              // Delete previous bot comment if exists
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });
              for (const comment of comments.data) {
                if (comment.user?.type === 'Bot' && comment.body?.includes('Vercel Preview Deployment')) {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: comment.id,
                  });
                }
              }
              // Post fresh comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

            // Always print to workflow summary
            await core.summary
              .addHeading('Vercel Preview')
              .addTable([
                [{data: 'Branch', header: true}, {data: 'Commit', header: true}, {data: 'URL', header: true}],
                [branch, sha, previewUrl],
              ])
              .write();
