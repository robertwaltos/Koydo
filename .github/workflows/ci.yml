name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
      STRIPE_SECRET_KEY: ${{ vars.STRIPE_SECRET_KEY || secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }}
      STRIPE_WEBHOOK_SECRET: ${{ vars.STRIPE_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated module registry is up to date
        run: npm run modules:check

      - name: Validate curriculum data quality rules
        run: npm run curriculum:validate

      - name: Validate capstone defense alignment
        run: npm run curriculum:capstone-defense:check

      - name: Verify API rate-limit guard coverage
        run: npm run security:api-rate-limit:check

      - name: Verify API authz guard coverage
        run: npm run security:api-authz-guard:check

      - name: Verify billing webhook hardening guard coverage
        run: npm run security:billing-webhook-hardening:check

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint changed JS/TS files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs')
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMR "${{ github.event.before }}...HEAD" -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs')
          else
            mapfile -t changed_files < <(git ls-files '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs')
          fi

          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "No JS/TS files changed; skipping lint."
            exit 0
          fi

          npx eslint "${changed_files[@]}"

      - name: Build
        run: npm run build
